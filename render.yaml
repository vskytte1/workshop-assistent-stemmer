services:
  - type: web
    name: ai-workshop-arena
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUBLIC_BASE_URL
        sync: false
